<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="loader"></div>
    <div class="mesh"></div>
    
    <div class="app-container">
        <header>
            <div class="top-row">
                <span class="logo">MAGIC MARKET</span>
                <div class="balance">0.00 €</div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск игр, аккаунтов...">
            </div>
        </header>

        <div class="categories" id="cats">
            <button class="active">Все</button>
            <button>Аккаунты</button>
            <button>Предметы</button>
            <button>Услуги</button>
        </div>

        <main class="grid" id="catalog"></main>
    </div>

    <nav class="navbar">
        <div class="nav-btn active">🏠</div>
        <div class="nav-btn">💬</div>
        <div class="nav-btn">👤</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
