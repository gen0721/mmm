<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="mesh-bg"></div>
    
    <header id="header">
        <div class="user-info">
            <div class="avatar" id="user-avatar">?</div>
            <div>
                <div class="welcome">Magic Store</div>
                <div class="username" id="user-name">Guest</div>
            </div>
        </div>
        <div class="wallet">
            <span id="balance">0.00</span><span>€</span>
        </div>
    </header>

    <div class="main-content">
        <div class="stories-container" id="featured-slider"></div>

        <div class="section-title">
            <h3>Популярное</h3>
            <button onclick="toggleCatalog()">Все <span class="arrow">→</span></button>
        </div>

        <div class="grid" id="market-grid">
            </div>
    </div>

    <nav class="tabbar">
        <div class="tab-item active" onclick="nav(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </div>
        <div class="tab-item" onclick="nav(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.5 8.5 0 0 1 8.5 6.8z"/></svg>
        </div>
        <div class="tab-item" onclick="nav(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-indicator"></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
