<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Market Ultra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="glow-point" id="cursor-glow"></div>
    
    <div id="catalog-overlay" class="overlay">
        <div class="overlay-content">
            <button class="close-btn" onclick="toggleCatalog()">✕</button>
            <h2>Категории</h2>
            <div class="cat-list">
                <div class="cat-item" onclick="filterCat('all')">💎 Все товары</div>
                <div class="cat-item" onclick="filterCat('acc')">👤 Аккаунты</div>
                <div class="cat-item" onclick="filterCat('item')">⚔️ Предметы</div>
                <div class="cat-item" onclick="filterCat('service')">🛠 Услуги</div>
            </div>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo">MAGIC<span class="dot">.</span></div>
            <div class="balance" id="user-balance">0.00 €</div>
        </div>
    </header>

    <main>
        <section class="hero-slider">
            <div class="slider-track" id="hero-track">
                </div>
        </section>

        <div class="action-bar">
            <button class="main-cat-btn" onclick="toggleCatalog()">
                <span class="icon">📁</span> КАТАЛОГ ТОВАРОВ
            </button>
        </div>

        <section class="main-grid" id="main-catalog">
            </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-icon active">⚡</div>
        <div class="nav-icon">💬</div>
        <div class="nav-icon">⚙️</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
