<div class="neon-bg"></div>

<div class="imba-card" style="margin: 20px;">
    <div style="display: flex; justify-content: space-between;">
        <div>
            <h1 style="font-family: 'Syncopate'; margin:0">LEVEL <span style="color:var(--neon)">99</span></h1>
            <p id="user-name">Loading...</p>
        </div>
        <button class="btn-crypto" onclick="deposit()">+ ПОПОЛНИТЬ</button>
    </div>
</div>

<div class="catalog-scroll">
    <div class="imba-card category" onclick="filter('acc')">АККАУНТЫ</div>
    <div class="imba-card category" onclick="filter('items')">ПРЕДМЕТЫ</div>
    <div class="imba-card category" onclick="filter('gold')">ВАЛЮТА</div>
</div>

<div id="admin-panel" class="admin-section" style="display:none; padding: 20px;">
    <h2 style="color: var(--neon-pink)">ADMIN PANEL</h2>
    <input type="text" id="itemName" placeholder="Название товара" class="imba-input">
    <button onclick="addItem()" class="btn-crypto" style="background: var(--neon-pink)">ДОБАВИТЬ В КАТАЛОГ</button>
</div>
